project: chinese_lips_qwen3_diagnostic500_eval
seed: 13
paths:
  raw_data_root: /data/datasets/chinese_lips
  challenge_jsonl: outputs/chinese_lips_train/reference_generation/qwen3_32b_hf_revision_a837704/diagnostic_500_refs_repaired.jsonl
  context_index_jsonl: outputs/chinese_lips_train/hf_revision/a83770446ded4599bf9d95d2b77cdcc7fe359ef7/evidence_qwen3_vl_context.jsonl
  run_dir: outputs/chinese_lips_train/experiments/qwen3_32b_diagnostic500/runs
  table_dir: outputs/chinese_lips_train/experiments/qwen3_32b_diagnostic500/tables
streaming:
  mode: transcript_oracle
  chunk_seconds: 2.0
  max_history_chars: 600
  visual_availability: past_only
  allowed_lookahead_sec: 0.0
  visual_window_sec: 2.0
context:
  evidence_top_m: 20
  packet_top_k: 5
  allowed_sources:
    - glossary
    - background
    - history
    - slide_ocr
    - slide_vlm
    - video_ocr
    - video_scene
    - video_object
    - video_action
    - video_spatial
    - video_vlm_frame
    - video_vlm_clip
policy:
  use_threshold: 0.3
  delay_threshold: 0.2
  weights:
    bm25: 0.25
    pinyin: 0.25
    temporal: 0.15
    source_trust: 0.1
    anchor: 0.15
    confidence: 0.1
  penalties:
    time_distance: 0.05
    conflict: 0.3
    unsupported: 0.25
    supporting: 0.05
    visual_only: 0.3
    broad_scene: 0.15
translation:
  provider: hf_transformers
  model: Qwen/Qwen3-32B
  device: cuda:0
  torch_dtype: bfloat16
  trust_remote_code: true
  enable_thinking: false
  system_prompt: "You are a Chinese-to-English speech translation engine. Return exactly one fluent English translation. Do not explain. Do not include notes. Do not output Chinese characters."
  temperature: 0.0
  max_new_tokens: 192
  batch_size: 40
  prompt_version: v3_visual_faithful_system_no_cjk_qwen3_32b_hf_revision_a837704
recorded_run:
  status: diagnostic_self_bleu_only_pending_independent_reference
  artifact_tag: qwen3_32b_diagnostic500_experiments_20260707
  hf_commit: 3cc7249d45eca71a4f0b5c06a6b0773efead128a
  path_in_hf_repo: experiments/qwen3_32b_diagnostic500_experiments_20260707/
  source_reference_tag: qwen3_32b_reference_diagnostic500_20260707
  caveats:
    - References and hypotheses were both generated by Qwen/Qwen3-32B.
    - V0-V5 used batch_size 192, while V6/V8 used batch_size 128 after V6 OOM at 192.
    - BLEU values are pipeline sanity signals, not method rankings.
  condition_batch_sizes:
    V0_no_context: 192
    V2_ocr_only: 192
    V3_visual_caption_only: 192
    V4_ocr_plus_visual: 192
    V5_naive_all_visual: 192
    V6_policy_visual: 128
    V8_wrong_visual: 128
conditions:
  - V0_no_context
  - V2_ocr_only
  - V3_visual_caption_only
  - V4_ocr_plus_visual
  - V5_naive_all_visual
  - V6_policy_visual
  - V8_wrong_visual
evaluation:
  use_comet: false
  normalize_case: true
  output_aliases_path: configs/term_aliases.yaml
  mismatch_modes:
    - matched
